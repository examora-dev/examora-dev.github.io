<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="
    We are still cooking up something amazing for you. Stay tuned for the launch of Examora, your ultimate exam preparation companion."
   > <title>Examora | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="Coming soon announcement">
        <p class="eyebrow">Coming soon</p>
        <h1>Examora</h1>

        <div class="planet-wrap" aria-hidden="true">
          <div class="halo"></div>
          <div class="planet">
            <span class="planet__facet planet__facet--one"></span>
            <span class="planet__facet planet__facet--two"></span>
            <span class="planet__facet planet__facet--three"></span>
            <span class="planet__facet planet__facet--four"></span>
          </div>
        </div>

        <p class="lede">
          We are still cooking up something amazing for you. Stay tuned for the launch of Examora, your ultimate exam preparation companion.
        </p>

        <div class="timer" aria-label="Countdown to 1 July 2026">
          <div class="timer__unit">
            <span id="days">00</span>
            <small>Days</small>
          </div>
          <div class="timer__unit">
            <span id="hours">00</span>
            <small>Hours</small>
          </div>
          <div class="timer__unit">
            <span id="minutes">00</span>
            <small>Minutes</small>
          </div>
          <div class="timer__unit">
            <span id="seconds">00</span>
            <small>Seconds</small>
          </div>
        </div>

        <form class="signup" id="signup-form">
          <label class="sr-only" for="email">Email address</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" />
          <button type="submit">Submit email</button>
        </form>
        <p class="signup__hint" id="signup-hint">Get notified when the launch goes live.</p>
      </section>
    </main>

    <div class="ambient ambient--top" aria-hidden="true"></div>
    <div class="ambient ambient--bottom" aria-hidden="true"></div>
    <script src="js/script.js"></script>
  </body>
</html>
